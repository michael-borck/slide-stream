# SlideStream self-hosted web UI.
#   cp .env.example .env   # then edit
#   docker compose up -d --build
# Put your server config (voice server URL, image provider, API keys) in
# ./slidestream.yaml — it is mounted read-only as the layered config. Any
# local asset it references (e.g. a voice_sample clip) needs its own mount
# below, and must be named by its in-container path.

services:
  slidestream:
    # Prebuilt image from GitHub's registry (built by .github/workflows/docker.yml).
    # Pin a version with SLIDESTREAM_IMAGE_TAG in .env (e.g. 2.7.0).
    image: ghcr.io/michael-borck/slide-stream:${SLIDESTREAM_IMAGE_TAG:-latest}
    # To build locally instead of pulling, comment out `image:` above and use:
    #   build:
    #     context: .
    #     args: {SLIDE_STREAM_VERSION: "${SLIDE_STREAM_VERSION:-}"}
    restart: unless-stopped
    ports:
      - "${PORT:-8080}:8080"
    environment:
      # Token gates private/full instances. The demo (SLIDESTREAM_DEMO=true)
      # is open instead: no token, but rate-limited (3 videos/hour per IP)
      # and capped at 5 slides per deck.
      SLIDESTREAM_TOKEN: ${SLIDESTREAM_TOKEN:-}
      # Show the "install locally for full control" banner on the hosted demo.
      SLIDESTREAM_DEMO: ${SLIDESTREAM_DEMO:-true}
      # This deployment sits behind a reverse proxy (nginx/Caddy/NPM for TLS),
      # so trust the X-Forwarded-For entry the proxy appends when rate-limiting
      # demo jobs per IP. Set 0 if clients hit the container port directly.
      SLIDESTREAM_TRUSTED_PROXY: ${SLIDESTREAM_TRUSTED_PROXY:-1}
      # Cloud provider keys (see .env.example). The LLM that writes the
      # narration reads its key from here: openai->OPENAI_API_KEY,
      # gemini->GEMINI_API_KEY, claude->ANTHROPIC_API_KEY, groq->GROQ_API_KEY.
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      ELEVENLABS_API_KEY: ${ELEVENLABS_API_KEY:-}
      # Stock-photo image providers (free with a signup key): pexels->
      # PEXELS_API_KEY, unsplash->UNSPLASH_ACCESS_KEY.
      PEXELS_API_KEY: ${PEXELS_API_KEY:-}
      UNSPLASH_ACCESS_KEY: ${UNSPLASH_ACCESS_KEY:-}
      # Bearer tokens for your self-hosted services (referenced as ${VAR} in
      # slidestream.yaml). Only set the ones your config actually uses.
      CHATTERBOX_TOKEN: ${CHATTERBOX_TOKEN:-}
      VOICEBOX_TOKEN: ${VOICEBOX_TOKEN:-}
      SWARMUI_TOKEN: ${SWARMUI_TOKEN:-}
      COMFYUI_TOKEN: ${COMFYUI_TOKEN:-}
    volumes:
      # Layered server config: providers, servers, keys via ${VAR} expansion.
      - ./slidestream.yaml:/home/app/.slidestream.yaml:ro
      # Reference clip(s) for the voicebox/chatterbox ephemeral-clone TTS.
      # The container cannot see host paths, so a voice_sample in
      # slidestream.yaml must point at the path on the RIGHT of this mount,
      # e.g. voice_sample: /home/app/voices/narrator.wav
      # Uncomment once ./voices exists — a missing host path makes Docker
      # create it as an empty root-owned directory.
      # - ./voices:/home/app/voices:ro
