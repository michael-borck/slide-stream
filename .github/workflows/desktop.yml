name: Build desktop apps

# Builds the Tauri desktop shell for macOS (Apple Silicon + Intel), Linux and
# Windows. Run manually (workflow_dispatch) to get installers as artifacts, or
# push a tag like desktop-v0.1.0 to also attach them to a GitHub release.

on:
  workflow_dispatch:
  push:
    tags: ['desktop-v*']

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest      # Apple Silicon
            name: macos-arm64
          - os: macos-15-intel    # Intel
            name: macos-x64
          - os: ubuntu-22.04
            name: linux-x64
          - os: windows-latest
            name: windows-x64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Linux webview deps
        if: startsWith(matrix.os, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential curl \
            wget file libxdo-dev libssl-dev libayatana-appindicator3-dev librsvg2-dev

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: desktop/src-tauri

      - name: Build
        working-directory: desktop
        env:
          # macOS code signing + notarization (no-ops on linux/windows)
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: npx --yes @tauri-apps/cli@^2 build

      # Stable asset names so the landing page can deep-link
      # .../releases/latest/download/<name> without version numbers or API calls.
      - name: Rename bundles to stable names
        shell: bash
        working-directory: desktop/src-tauri/target/release/bundle
        run: |
          mkdir -p out
          case "${{ matrix.name }}" in
            macos-arm64) mv dmg/*.dmg out/SlideStream-macos-apple-silicon.dmg ;;
            macos-x64)   mv dmg/*.dmg out/SlideStream-macos-intel.dmg ;;
            linux-x64)
              mv appimage/*.AppImage out/SlideStream-linux.AppImage
              mv deb/*.deb out/SlideStream-linux.deb
              mv rpm/*.rpm out/SlideStream-linux.rpm ;;
            windows-x64)
              mv nsis/*-setup.exe out/SlideStream-windows-setup.exe
              mv msi/*.msi out/SlideStream-windows.msi || true ;;
          esac
          ls -la out/

      - uses: actions/upload-artifact@v4
        with:
          name: slidestream-desktop-${{ matrix.name }}
          path: desktop/src-tauri/target/release/bundle/out/*
          if-no-files-found: warn

      - name: Attach to release (tag builds)
        if: startsWith(github.ref, 'refs/tags/desktop-v')
        uses: softprops/action-gh-release@v2
        with:
          files: desktop/src-tauri/target/release/bundle/out/*
